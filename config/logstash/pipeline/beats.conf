# CORE ingest pipeline: Beats -> Logstash -> Elasticsearch, mutual TLS on both hops.

input {
  beats {
    port => 5044
    ssl_enabled => true

    # Logstash presents its server certificate to the Beat.
    ssl_certificate => "/certificates/logstash/logstash.pem"
    ssl_key => "/certificates/logstash/logstash.key"

    # Require and verify a client certificate from every Beat (mutual TLS).
    ssl_certificate_authorities => ["/certificates/ca/ca.pem"]
    ssl_client_authentication => "required"
  }
}

output {
  elasticsearch {
    hosts => ["https://es01:9200", "https://es02:9200", "https://es03:9200"]

    # One index per beat type, e.g. logstash-filebeat, logstash-packetbeat.
    index => "logstash-%{[@metadata][beat]}"

    # Authenticate as the least-privilege logstash_writer user.
    user => "logstash_writer"
    password => "${LOGSTASH_PASSWORD}"

    # Mutual TLS to Elasticsearch: verify the server against our CA and present
    # Logstash's client certificate.
    ssl_enabled => true
    ssl_certificate_authorities => ["/certificates/ca/ca.pem"]
    ssl_certificate => "/certificates/logstash/logstash.pem"
    ssl_key => "/certificates/logstash/logstash.key"

    # The logstash_writer role is scoped to writing logstash-* only, so do not
    # attempt template/ILM management (which would need elevated privileges).
    manage_template => false
    ilm_enabled => false
  }
}
