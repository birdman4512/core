services:
  # Phase 1 (one-shot): generate the CA + TLS certificates before the nodes
  # start. Runs as root so it can own the certs to the service uids.
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-8.15.3}
    container_name: core-setup
    init: true
    user: "0"
    environment:
      CERT_DAYS: ${CERT_DAYS:-730}
    volumes:
      - ./stack-data/certificates:/certs
      - ./config/setup/entrypoint.sh:/entrypoint.sh:ro
    command: ["bash", "/entrypoint.sh", "certs"]
    networks:
      - core-net

  # Phase 2 (one-shot): once the cluster is up, set the kibana_system password
  # and create the least-privilege logstash_writer account. Idempotent.
  configure:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-8.15.3}
    container_name: core-configure
    init: true
    depends_on:
      es01:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOST: ${ELASTICSEARCH_HOST:-es01}
      ELASTICSEARCH_PORT: ${ELASTICSEARCH_PORT:-9200}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      KIBANA_PASSWORD: ${KIBANA_PASSWORD}
      LOGSTASH_PASSWORD: ${LOGSTASH_PASSWORD}
    volumes:
      - ./stack-data/certificates:/certs:ro
      - ./config/setup/entrypoint.sh:/entrypoint.sh:ro
    command: ["bash", "/entrypoint.sh", "configure"]
    networks:
      - core-net

  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-8.15.3}
    container_name: es01
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      ES_JAVA_OPTS: "-Xms512m -Xmx512m" # min/max heap; set both to ~50% of the container's RAM
      node.name: es01
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      xpack.security.transport.ssl.key: certificates/es01/es01.key
      xpack.security.transport.ssl.certificate: certificates/es01/es01.pem
      xpack.security.transport.ssl.certificate_authorities: certificates/ca/ca.pem
      xpack.security.http.ssl.key: certificates/es01/es01.key
      xpack.security.http.ssl.certificate: certificates/es01/es01.pem
      xpack.security.http.ssl.certificate_authorities: certificates/ca/ca.pem
    ulimits:
      memlock:
        soft: -1 # unlimited so bootstrap.memory_lock can pin the heap
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - "./config/elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro"
      - "es-data1:/usr/share/elasticsearch/data"
      - ./stack-data/certificates/es01:/usr/share/elasticsearch/config/certificates/es01:ro
      - ./stack-data/certificates/ca-share:/usr/share/elasticsearch/config/certificates/ca:ro
    ports:
      - 9200:9200 # REST API
    networks:
      - core-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s --cacert config/certificates/ca/ca.pem --cert config/certificates/es01/es01.pem --key config/certificates/es01/es01.key https://localhost:9200 | grep -q 'missing authentication credentials'"]
      interval: 10s
      timeout: 10s
      retries: 60

  es02:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-8.15.3}
    container_name: es02
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      node.name: es02
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      xpack.security.transport.ssl.key: certificates/es02/es02.key
      xpack.security.transport.ssl.certificate: certificates/es02/es02.pem
      xpack.security.transport.ssl.certificate_authorities: certificates/ca/ca.pem
      xpack.security.http.ssl.key: certificates/es02/es02.key
      xpack.security.http.ssl.certificate: certificates/es02/es02.pem
      xpack.security.http.ssl.certificate_authorities: certificates/ca/ca.pem
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - "./config/elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro"
      - "es-data2:/usr/share/elasticsearch/data"
      - ./stack-data/certificates/es02:/usr/share/elasticsearch/config/certificates/es02:ro
      - ./stack-data/certificates/ca-share:/usr/share/elasticsearch/config/certificates/ca:ro
    networks:
      - core-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s --cacert config/certificates/ca/ca.pem --cert config/certificates/es02/es02.pem --key config/certificates/es02/es02.key https://localhost:9200 | grep -q 'missing authentication credentials'"]
      interval: 10s
      timeout: 10s
      retries: 60

  es03:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-8.15.3}
    container_name: es03
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      node.name: es03
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      xpack.security.transport.ssl.key: certificates/es03/es03.key
      xpack.security.transport.ssl.certificate: certificates/es03/es03.pem
      xpack.security.transport.ssl.certificate_authorities: certificates/ca/ca.pem
      xpack.security.http.ssl.key: certificates/es03/es03.key
      xpack.security.http.ssl.certificate: certificates/es03/es03.pem
      xpack.security.http.ssl.certificate_authorities: certificates/ca/ca.pem
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - "./config/elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro"
      - "es-data3:/usr/share/elasticsearch/data"
      - ./stack-data/certificates/es03:/usr/share/elasticsearch/config/certificates/es03:ro
      - ./stack-data/certificates/ca-share:/usr/share/elasticsearch/config/certificates/ca:ro
    networks:
      - core-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s --cacert config/certificates/ca/ca.pem --cert config/certificates/es03/es03.pem --key config/certificates/es03/es03.key https://localhost:9200 | grep -q 'missing authentication credentials'"]
      interval: 10s
      timeout: 10s
      retries: 60

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTICSEARCH_VERSION:-8.15.3}
    container_name: kibana
    restart: unless-stopped
    depends_on:
      es01:
        condition: service_healthy
      configure:
        condition: service_completed_successfully
    # Hosts, SSL, and cert paths live in config/kibana/config/kibana.yml.
    # Only secrets are injected here so they stay out of version control.
    environment:
      # Kibana authenticates as the built-in kibana_system user, never the elastic superuser.
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: ${KIBANA_PASSWORD}
      # Required so saved objects / sessions survive restarts (>=32 chars each).
      XPACK_SECURITY_ENCRYPTIONKEY: ${KIBANA_ENCRYPTION_KEY}
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: ${KIBANA_ENCRYPTION_KEY}
      XPACK_REPORTING_ENCRYPTIONKEY: ${KIBANA_ENCRYPTION_KEY}
    volumes:
      - "./config/kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro"
      - ./stack-data/certificates/kibana:/usr/share/kibana/config/certificates/kibana:ro
      - ./stack-data/certificates/ca-share:/usr/share/kibana/config/certificates/ca:ro
    ports:
      - 5601:5601
    networks:
      - core-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s -k https://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 10s
      timeout: 10s
      retries: 60

  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTICSEARCH_VERSION:-8.15.3}
    container_name: logstash
    restart: unless-stopped
    depends_on:
      es01:
        condition: service_healthy
      configure:
        condition: service_completed_successfully
    environment:
      # Used by config/logstash/pipeline/beats.conf to authenticate to Elasticsearch.
      LOGSTASH_PASSWORD: ${LOGSTASH_PASSWORD}
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "5044:5044" # Beats input (mutual TLS)
    volumes:
      - ./config/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./config/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./stack-data/certificates/logstash:/certificates/logstash:ro
      - ./stack-data/certificates/ca-share:/certificates/ca:ro
    networks:
      - core-net

networks:
  core-net:
    driver: bridge

volumes:
  es-data1:
  es-data2:
  es-data3:
